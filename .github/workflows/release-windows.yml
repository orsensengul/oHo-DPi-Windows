name: Build Windows release zip

on:
  workflow_dispatch:
    inputs:
      spoofdpi_ref:
        description: "xvzc/spoofdpi ref to build"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout oHo-DPi-Windows
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: false

      - name: Checkout SpoofDPI
        uses: actions/checkout@v4
        with:
          repository: xvzc/spoofdpi
          ref: ${{ github.event.inputs.spoofdpi_ref || 'main' }}
          path: spoofdpi-src

      - name: Patch SpoofDPI Windows socket build
        shell: pwsh
        run: |
          $file = "spoofdpi-src\internal\netutil\conn.go"
          $text = Get-Content -Raw $file
          $patched = $text.Replace(
            "syscall.SetsockoptInt(int(fd), level, opt, int(ttl))",
            "syscall.SetsockoptInt(syscall.Handle(fd), level, opt, int(ttl))"
          )
          if ($patched -eq $text) {
            throw "Expected socket option call was not found in $file"
          }
          Set-Content -NoNewline -Encoding UTF8 $file $patched
          git -C spoofdpi-src diff -- internal/netutil/conn.go

      - name: Patch SpoofDPI Windows pcap device lookup
        shell: pwsh
        run: |
          $file = "spoofdpi-src\internal\packet\handle_default.go"
          Set-Content -Encoding UTF8 $file @'
          //go:build !linux

          package packet

          import (
              "net"

              "github.com/google/gopacket/pcap"
          )

          var _ Handle = (*DefaultHandle)(nil)

          type DefaultHandle struct {
              *pcap.Handle
          }

          func pcapDeviceName(iface *net.Interface) string {
              ifaceAddrs, err := iface.Addrs()
              if err != nil {
                  return iface.Name
              }

              wanted := map[string]struct{}{}
              for _, addr := range ifaceAddrs {
                  switch v := addr.(type) {
                  case *net.IPNet:
                      wanted[v.IP.String()] = struct{}{}
                  case *net.IPAddr:
                      wanted[v.IP.String()] = struct{}{}
                  }
              }

              devs, err := pcap.FindAllDevs()
              if err != nil {
                  return iface.Name
              }

              for _, dev := range devs {
                  if dev.Name == iface.Name || dev.Description == iface.Name {
                      return dev.Name
                  }
                  for _, addr := range dev.Addresses {
                      if _, ok := wanted[addr.IP.String()]; ok {
                          return dev.Name
                      }
                  }
              }

              return iface.Name
          }

          func NewHandle(iface *net.Interface) (Handle, error) {
              iHandle, err := pcap.NewInactiveHandle(pcapDeviceName(iface))
              if err != nil {
                  return nil, err
              }

              // max bytes per packet to capture
              err = iHandle.SetSnapLen(3200)
              if err != nil {
                  return nil, err
              }

              // in immediate mode, packets are delivered to the application
              // as soon as they arrive. In other words, this overrides SetTimeout.
              err = iHandle.SetImmediateMode(true)
              if err != nil {
                  return nil, err
              }

              // create a pcap handle
              handle, err := iHandle.Activate()
              if err != nil {
                  return nil, err
              }

              // activation successful, nil the inactive handle so defer doesn't close it
              iHandle = nil

              return &DefaultHandle{handle}, err
          }

          func (h *DefaultHandle) ClearBPF() error {
              return h.SetBPFFilter("")
          }

          func (h *DefaultHandle) SetBPFRawInstructionFilter(
              inst []BPFInstruction,
          ) error {
              var converted []pcap.BPFInstruction
              for _, v := range inst {
                  converted = append(converted, pcap.BPFInstruction{
                      Code: v.Op, Jt: v.Jt, Jf: v.Jf, K: v.K,
                  })
              }

              return h.SetBPFInstructionFilter(converted)
          }
          '@
          git -C spoofdpi-src diff -- internal/packet/handle_default.go

      - name: Patch SpoofDPI Windows fixed TTL sniffer
        shell: pwsh
        run: |
          Set-Content -Encoding UTF8 "spoofdpi-src\internal\packet\fixed_sniffer_windows.go" @'
          package packet

          import (
              "net"

              "github.com/xvzc/spoofdpi/internal/config"
              "github.com/xvzc/spoofdpi/internal/netutil"
          )

          var _ Sniffer = (*FixedSniffer)(nil)

          type FixedSniffer struct {
              ttl uint8
          }

          func NewFixedSniffer(cfg *config.RuntimeConfig) *FixedSniffer {
              ttl := uint8(cfg.Conn.DefaultFakeTTL)
              if ttl == 0 {
                  ttl = 8
              }
              return &FixedSniffer{ttl: ttl}
          }

          func (s *FixedSniffer) StartCapturing() {}

          func (s *FixedSniffer) Register(addrs []net.IP) {}

          func (s *FixedSniffer) GetOptimalTTL(key netutil.IPKey) uint8 {
              return s.ttl
          }
          '@

          $file = "spoofdpi-src\cmd\spoofdpi\main.go"
          $text = Get-Content -Raw $file
          $text = $text.Replace(
            "hopCache := cache.NewLRUCache[netutil.IPKey, uint8](16, 8192, nil)",
            "hopCache := cache.NewLRUCache[netutil.IPKey, uint8](16, 8192, nil)`n`t_ = hopCache"
          )
          $text = $text -replace "`t`ttcpSniffer = packet\.NewTCPSniffer\(pktLogger, tcpHandle, hopCache, &cfg\.Runtime\)\r?\n`t`ttcpWriter = packet\.NewTCPWriter\(pktLogger, tcpHandle, route\)\r?\n`t`ttcpSniffer\.StartCapturing\(\)", "`t`ttcpSniffer = packet.NewFixedSniffer(&cfg.Runtime)`n`t`ttcpWriter = packet.NewTCPWriter(pktLogger, tcpHandle, route)"
          $text = $text -replace "`t`tudpSniffer = packet\.NewUDPSniffer\(pktLogger, udpHandle, hopCache, &cfg\.Runtime\)\r?\n`t`tudpWriter = packet\.NewUDPWriter\(pktLogger, udpHandle, route\)\r?\n`t`tudpSniffer\.StartCapturing\(\)", "`t`tudpSniffer = packet.NewFixedSniffer(&cfg.Runtime)`n`t`tudpWriter = packet.NewUDPWriter(pktLogger, udpHandle, route)"
          if ($text -notmatch "NewFixedSniffer") {
            throw "Expected fixed sniffer patch was not applied"
          }
          Set-Content -NoNewline -Encoding UTF8 $file $text
          git -C spoofdpi-src diff -- cmd/spoofdpi/main.go internal/packet/fixed_sniffer_windows.go

      - name: Build spoofdpi.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\oHo-DPi-Windows\bin | Out-Null
          $commit = git -C spoofdpi-src rev-parse --short HEAD
          go build -C spoofdpi-src -ldflags "-s -w -X main.commit=$commit -X main.build=oHo-DPi-Windows" -o ..\dist\oHo-DPi-Windows\bin\spoofdpi.exe .\cmd\spoofdpi

      - name: Prepare zip layout
        shell: pwsh
        run: |
          Copy-Item windows\oHo-DPi.ps1 dist\oHo-DPi-Windows\oHo-DPi.ps1
          New-Item -ItemType Directory -Force -Path dist\oHo-DPi-Windows\config | Out-Null
          Copy-Item windows\config\*.toml dist\oHo-DPi-Windows\config\
          Copy-Item release\*.bat dist\oHo-DPi-Windows\
          Copy-Item release\README.txt dist\oHo-DPi-Windows\README.txt
          Compress-Archive -Path dist\oHo-DPi-Windows -DestinationPath dist\oHo-DPi-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oHo-DPi-Windows
          path: dist/oHo-DPi-Windows.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/oHo-DPi-Windows.zip
